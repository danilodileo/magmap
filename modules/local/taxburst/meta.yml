name: TAXBURST
description: Generate interactive taxonomic visualization from Kraken2 reports
keywords:
  - taxonomy
  - visualization
  - kraken2
  - metagenomics
  - interactive
tools:
  - taxburst:
      description: Modern replacement for Krona with better GTDB support
      homepage: https://github.com/sourmash-bio/taxburst
      documentation: https://github.com/sourmash-bio/taxburst
      tool_dev_url: https://github.com/sourmash-bio/taxburst
      licence: ["BSD-3-Clause"]
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - kraken_report:
      type: file
      description: Kraken2 taxonomic classification report
      pattern: "*.{txt,report}"
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
  - html:
      type: file
      description: Interactive HTML taxonomic visualization
      pattern: "*.html"
authors:
  - "@danilodileo"
maintainers:
  - "@danilodileo"
