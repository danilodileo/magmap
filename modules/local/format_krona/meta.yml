name: FORMAT_KRONA
description: Convert Krona format file to tabular taxonomy format with taxonomic ranks as columns
keywords:
  - krona
  - taxonomy
  - format
  - tabular
  - metagenomics
  - classification
tools:
  - r-base:
      description: R programming language
      homepage: https://www.r-project.org/
      documentation: https://www.r-project.org/manuals.html
      licence: ["GPL-2", "GPL-3"]
  - r-tidyverse:
      description: Collection of R packages for data science
      homepage: https://www.tidyverse.org/
      documentation: https://www.tidyverse.org/packages/
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - krona_file:
      type: file
      description: Krona format file from kreport2krona.py containing count and taxonomy data
      pattern: "*.{krona,txt,tsv}"
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
  - format_tsv:
      type: file
      description: Tabular format file with fraction and taxonomic ranks (superkingdom, phylum, class, order, family, genus, species) as columns
      pattern: "*.tsv"
authors:
  - "@danilodileo"
maintainers:
  - "@danilodileo"