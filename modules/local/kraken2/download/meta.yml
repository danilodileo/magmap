name: KRAKEN2_DOWNLOAD_DB
description: Download and extract Kraken2 database from remote URL
keywords:
  - kraken2
  - database
  - download
  - taxonomy
  - metagenomics
tools:
  - wget:
      description: GNU Wget is a free utility for non-interactive download of files from the Web
      homepage: https://www.gnu.org/software/wget/
      documentation: https://www.gnu.org/software/wget/manual/
      tool_dev_url: https://savannah.gnu.org/projects/wget
      licence: ["GPL v3+"]
  - tar:
      description: GNU tar archiving utility
      homepage: https://www.gnu.org/software/tar/
      documentation: https://www.gnu.org/software/tar/manual/
      licence: ["GPL v3+"]
input:
  - db_name:
      type: string
      description: Name for the database directory
      pattern: ".*"
  - db_url:
      type: string
      description: URL to download the Kraken2 database archive
      pattern: "https?://.*"
output:
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
  - db_dir:
      type: directory
      description: Extracted Kraken2 database directory
      pattern: "*/"
authors:
  - "@danilodileo"
maintainers:
  - "@danilodileo"
