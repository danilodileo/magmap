# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "catprokkatsvs"
description: Concatenates Prokka TSV files and normalizes column names for the pipeline
keywords:
  - compress
  - gzip
  - parallelized
tools:
  - "pigz":
      description: "Parallel implementation of the gzip algorithm."
      homepage: "https://zlib.net/pigz/"
      documentation: "https://zlib.net/pigz/pigz.pdf"

      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - prokka_tsvs:
        type: files
        description: Files to be concatenated
        pattern: "*.*"
        ontologies: []
output:
  archive:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - $archive:
          type: file
          description: The concatenated and compressed file
          pattern: "*.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML
authors:
  - "@erikrikarddaniel"
maintainers:
  - "@erikrikarddaniel"
