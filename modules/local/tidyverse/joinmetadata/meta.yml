# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "tidyverse_joinmetadata"
description: collects genome metadata, i.e. taxonomy and statistics from GTDB and/or GTDB-Tk and CheckM/CheckM2
keywords:
  - genome
  - statistics
  - taxonomy
tools:
  - "tidyverse":
      description: "The 'tidyverse' is a set of packages that work in harmony because
        they share common data representations and 'API' design. This package is designed
        to make it easy to install and load multiple 'tidyverse' packages in a single
        step. Learn more about the 'tidyverse' at <https://www.tidyverse.org>."
      homepage: "None"
      documentation: "None"
      tool_dev_url: "None"
      doi: ""
      licence: ["MIT"]
      identifier: null

input:
  - genomes:
      type: file
      description: Single column file (no header) with genome accession numbers
      pattern: "*.tsv(.gz)?"
  - gtdb_metadata:
      type: files
      description: GTDB metadata files, i.e. ar53_metadata_rNNN.tsv.gz and bac120_metadata_rNNN.tsv.gz
      pattern: "*.tsv(.gz)?"
  - gtdbtk_metadata:
      type: files
      description: GTDB-Tk output files, e.g. `gtdbtk.bac120.summary.tsv`
      pattern: "*.tsv(.gz)?"
  - checkm_metadata:
      type: files
      description: CheckM output files from the "lineage_wf" workflow
      pattern: "*.tsv(.gz)?"

output:
  genome_metadata:
    - "*.tsv.gz":
        type: file
        description: TSV file with genome information: taxonomy plus statistics
        pattern: "*.tsv.gz"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: "http://edamontology.org/format_3750" # YAML

authors:
  - "@erikrikarddaniel"
maintainers:
  - "@erikrikarddaniel"
