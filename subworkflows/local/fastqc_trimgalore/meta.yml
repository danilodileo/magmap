# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: fastqc_trimgalore
description: Read QC, UMI extraction and trimming
keywords:
  - fastqc
  - trimming
  - fastq
components:
  - fastqc
  - trimgalore
input:
  - reads:
      description: |
        The input channel containing fastq read files
        Structure: [ val(meta), [ path(reads) ] ]
  - skip_fastqc:
      description: |
        Boolean deciding if fastqc should be run or not
        Structure: boolean
  - skip_trimming:
      description: |
        Boolean deciding if trimming should be run or not
        Structure: boolean
output:
  - reads:
      description: |
        Fastq files after trimming
        Structure: [ val(meta), [ path(fastq) ] ]
  - fastqc_html:
      description: |
        FastQC HTML file
        Structure: [ val(meta), [ path(html) ] ]
  - fastqc_zip:
      description: |
        FastQC zip file
        Structure: [ val(meta), [ path(zip) ] ]
  - trim_html:
      description: |
        Trimming HTML file
        Structure: [ val(meta), [ path(html) ] ]
  - trim_zip:
      description: |
        Trimming zip file
        Structure: [ val(meta), [ path(zip) ] ]
  - trim_zip:
      description: |
        Trimming log file
        Structure: [ val(meta), [ path(txt) ] ]
  - versions:
      description: |
        Files containing software versions
        Structure: [ path(versions.yml) ]
authors:
  - "@danilodileo"
  - "@erikrikarddaniel"
maintainers:
  - "@danilodileo"
  - "@erikrikarddaniel"
